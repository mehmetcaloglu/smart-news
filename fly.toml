app = "duyguhaber"
primary_region = "ams"  # Amsterdam — Türkiye'ye yakın ücretsiz region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # Sürekli ayakta kalsın
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "duyguhaber_data"
  destination = "/app/data"    # SQLite DB buraya mount edilir
  initial_size = "3gb"
